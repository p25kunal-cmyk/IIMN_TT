<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M1F1Q49375"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date()); gtag('config', 'G-M1F1Q49375');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>IIM Timetable</title>
  <meta name="description" content="Live MBA timetable with attendance tracking">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1c1f24" id="themeColor">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IIM Timetable">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ── Light theme (default) ── */
    :root {
      --bg: #f6f5f1;
      --bg-elev: #ffffff;
      --bg-elev-2: #eef0ee;
      --border: #dde1de;
      --text: #1c1f24;
      --text-dim: #767d85;
      --accent: #d99a1b;
      --accent-dim: rgba(217, 154, 27, 0.12);
      --good: #1f9d5c;
      --danger: #d4493a;
      --warn: #e0820a;
      --radius: 12px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    /* ── Dark theme ── */
    [data-theme=dark] {
      --bg: #13151a;
      --bg-elev: #1c1f26;
      --bg-elev-2: #242831;
      --border: #2e3340;
      --text: #e8eaf0;
      --text-dim: #7a8290;
      --accent: #e8a820;
      --accent-dim: rgba(232, 168, 32, 0.12);
      --good: #2dc776;
      --danger: #e05c4a;
      --warn: #f09030;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: var(--bg);
      transition: background .2s;
    }

    #root {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 72px;
      transition: background .2s, color .2s;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .title small {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: transform .12s;
      flex-shrink: 0;
    }

    .icon-btn:active {
      transform: scale(0.95);
    }
    
    @media all and (display-mode: standalone) {
      #btnInstall, #btnInstallLogin {
        display: none !important;
      }
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      object-fit: cover;
    }

    .icon-btn.spinning svg {
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg-elev);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 20;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 4px 10px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-dim);
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: .5px;
      transition: color .15s;
    }

    .nav-btn .nav-icon {
      font-size: 20px;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    /* Sync */
    .sync-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 0 0 rgba(31, 157, 92, .5);
      animation: pulse 2s infinite;
    }

    .sync-dot.err {
      background: var(--danger);
      animation: none;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(31, 157, 92, .45);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(31, 157, 92, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(31, 157, 92, 0);
      }
    }

    .sticky-container {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px 16px 6px;
    }

    .board-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .board-card.now {
      border-color: rgba(217, 154, 27, .4);
      background: linear-gradient(150deg, var(--accent-dim), var(--bg-elev) 60%);
    }

    .board-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .board-card.now .board-label {
      color: var(--accent);
    }

    .board-code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      margin: 4px 0 2px;
    }

    .board-room {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .seat-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      color: var(--text);
      background: var(--bg-elev-2);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .board-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .board-empty {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      margin: auto;
    }

    .board-pill {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Days */
    .days {
      padding: 4px 16px 0;
    }

    .day-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      background: var(--bg-elev);
      scroll-margin-top: 220px;
    }

    .day-card.today {
      border-color: rgba(217, 154, 27, .5);
    }

    .day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }

    .day-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
    }

    .day-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .today-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 1px 7px;
      margin-left: 6px;
      text-transform: uppercase;
    }

    /* Slot */
    .slot-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      transition: opacity .2s;
    }

    .slot-row:last-child {
      border-bottom: none;
    }

    .slot-row.absent-row {
      opacity: 0.42;
    }

    .slot-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      width: 72px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .slot-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .slot-top {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .subject-badge {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 6px;
      color: #fff;
      letter-spacing: .3px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .lec-num {
      font-size: 10px;
      opacity: .75;
      font-weight: 400;
    }

    .room-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 7px;
      display: inline-block;
    }

    .info-line {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    .empty-day {
      padding: 12px;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Attend btn */
    .attend-btn {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-elev-2);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .1s;
    }

    .attend-btn:active {
      transform: scale(0.82);
    }

    .attend-btn.is-absent {
      background: rgba(212, 73, 58, .08);
      border-color: var(--danger);
    }

    /* Calendar page */
    .cal-page {
      padding: 0 16px 12px;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 8px;
    }

    .cal-nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cal-month {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 12px;
    }

    .cal-dow {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      padding: 4px 0;
      text-transform: uppercase;
    }

    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid transparent;
      position: relative;
      transition: background .12s;
    }

    .cal-day:hover {
      background: var(--bg-elev-2);
    }

    .cal-day.has-class {
      color: var(--text);
    }

    .cal-day.today-cal {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cal-day.selected-cal {
      background: var(--accent);
      color: #16181c !important;
      border-color: transparent;
    }

    .cal-day.other-month {
      opacity: 0.3;
    }

    .cal-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      bottom: 4px;
    }

    .cal-detail {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cal-detail-head {
      padding: 10px 14px;
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }

    .cal-detail-date {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 13, .65);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(3px);
    }

    .sheet {
      background: var(--bg-elev);
      width: 100%;
      max-width: 480px;
      border-radius: 18px 18px 0 0;
      border: 1px solid var(--border);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      animation: slideUp .22s ease;
      padding-bottom: env(safe-area-inset-bottom);
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sheet-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 16px;
    }

    .sheet-body {
      padding: 14px 16px;
      overflow-y: auto;
      flex: 1;
    }

    .sheet-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    input[type=search],
    input[type=url] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-body);
      margin-bottom: 8px;
    }

    input::placeholder {
      color: #a0a8b0;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #16181c;
    }

    .toplinks {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .toplinks span {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      margin-right: 12px;
    }

    .chip-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding: 4px 2px;
    }

    .chip-item:last-child {
      border-bottom: none;
    }

    .chip-list label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      flex-grow: 1;
      padding: 4px 0;
    }
    
    .seat-input {
      width: 55px;
      padding: 6px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
    }
    
    .seat-input.hidden {
      display: none;
    }

    .chip-list input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
    }

    .chip-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .chip-sub {
      font-weight: 600;
    }

    .chip-sec {
      color: var(--text-dim);
      font-size: 12px;
    }

    /* Attendance page */
    .att-page {
      padding: 12px 16px;
    }

    .att-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .att-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev-2);
    }

    .att-subject {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
    }

    .att-status-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .att-status-pill.ok {
      background: rgba(31, 157, 92, .12);
      color: var(--good);
    }

    .att-status-pill.warn {
      background: rgba(224, 130, 10, .12);
      color: var(--warn);
    }

    .att-status-pill.danger {
      background: rgba(212, 73, 58, .12);
      color: var(--danger);
    }

    .att-bar-wrap {
      height: 5px;
      background: var(--border);
      margin: 8px 14px 4px;
    }

    .att-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .4s;
    }

    .att-stats {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      padding: 2px 14px 8px;
    }

    .att-lectures {
      padding: 8px 14px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .lec-chip {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .12s;
      background: var(--bg-elev-2);
      color: var(--text-dim);
      user-select: none;
    }

    .lec-chip.present {
      border-color: var(--good);
      background: rgba(31, 157, 92, .1);
      color: var(--good);
    }

    .lec-chip.absent {
      border-color: var(--danger);
      background: rgba(212, 73, 58, .1);
      color: var(--danger);
    }

    .lec-chip.upcoming {
      opacity: 0.38;
      cursor: default;
      border-style: dashed;
    }

    .lec-chip:active {
      transform: scale(0.82);
    }

    /* Setup/Error */
    .setup-page {
      padding: 24px 20px;
    }

    .setup-logo {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      margin-bottom: 4px;
    }

    .setup-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }

    .setup-sub {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .status-msg {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.7;
    }

    .empty-state b {
      color: var(--text);
    }

    /* Links page */
    .links-page {
      padding: 12px 16px;
    }

    .links-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin: 16px 0 8px;
    }

    .links-section-title:first-child {
      margin-top: 4px;
    }

    .link-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;

    .fab {

    .link-form-row {

    .link-form-row label {

    .link-form-row input {

      border-radius: 8px;

    .links-empty {

    .links-empty-icon {

    .pinned-card {

    .pinned-badge {

  </style>

<body>
  <div id="root"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADOXv5tMuN_jw8iuWOp8sJ0diGYn-KwQE",
      authDomain: "iimn-tt-46c86.firebaseapp.com",
      projectId: "iimn-tt-46c86",
      storageBucket: "iimn-tt-46c86.firebasestorage.app",
      messagingSenderId: "782167847284",
      appId: "1:782167847284:web:4eb8c62f2345bd40ad3c21",
      measurementId: "G-M1F1Q49375"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // Export firebase objects to window for use inside IIFE
    window.fbAuth = auth;
    window.fbDb = db;
    window.fbGoogleProvider = googleProvider;
    window.fbSignInWithPopup = signInWithPopup;
    window.fbSignOut = signOut;
    window.fbOnAuthStateChanged = onAuthStateChanged;
    window.fbDoc = doc;
    window.fbGetDoc = getDoc;
    window.fbSetDoc = setDoc;
    window.fbCollection = collection;
    window.fbGetDocs = getDocs;

    (function () {
      var ROOT = document.getElementById('root');
      var currentPage = 'timetable'; // 'timetable' | 'attendance' | 'calendar' | 'links'
      var darkMode = false;
      var calSelectedDate = null;
      var calViewMonth = new Date();

      // 20 hand-picked visually distinct colors
      var COLORS = [
        '#e07a5f','#5aa9e6','#6b9e78','#bb8fce','#e0a020',
        '#5f9ea0','#c97b84','#7b9ed9','#b07840','#6fb3b8',
        '#e8784d','#4caf82','#9b72cf','#d4a843','#5b8dd9',
        '#c45c7a','#52b5a3','#e06060','#7aad5a','#a07fbf'
      ];
      var _colorMap = {};
      function buildColorMap() {
        _colorMap = {};
        if (!state.data) return;
        var subjects = [];
        state.data.rows.forEach(function(r) {
          r.cells.forEach(function(c) {
            c.split('\n').forEach(function(l) {
              var p = parseLine(l);
              if (p && subjects.indexOf(p.subject) === -1) subjects.push(p.subject);
            });
          });
        });
        subjects.sort();
        subjects.forEach(function(sub, i) { _colorMap[sub] = COLORS[i % COLORS.length]; });
      }
      function colorFor(c) {
        var sub = (c || '').split('-')[0].toUpperCase();
        return _colorMap[sub] || COLORS[0];
      }

      function parseLine(line) {
        if (!line || typeof line !== 'string') return null;
        var isCancelled = /cancel/i.test(line) || /[\u0336\u0335]/.test(line);
        var c = line.replace(/[\u0336\u0335]/g, '').replace(/\(?cancelled\)?/ig, '').trim().replace(/\s+/g, '');
        if (!c) return null;
        var m = c.match(/^([A-Z]+)-([A-Z])\/(\d+)\/(.+)$/i);
        if (m) return { key: (m[1] + '-' + m[2]).toUpperCase(), subject: m[1].toUpperCase(), section: m[2].toUpperCase(), week: m[3], room: m[4], cancelled: isCancelled };
        var m2 = c.match(/^([A-Z]+)\/(\d+)\/(.+)$/i);
        if (m2) return { key: m2[1].toUpperCase(), subject: m2[1].toUpperCase(), section: '', week: m2[2], room: m2[3], cancelled: isCancelled };
        return null;
      }

      var state = { data: null, mySubjects: [], attendance: {}, seats: {}, links: [], lastFetch: null, fetchError: null, fetching: false, user: null, authInitialized: false, adminUsers: null, networkCompareMode: false, networkSelected: {} };
      function getLocal(k) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (e) { return null; } }
      function setLocal(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { } }
      
      function syncToFirebase() {
        if (!state.user) return;
        window.fbSetDoc(window.fbDoc(window.fbDb, "users", state.user.uid), {
          mySubjects: state.mySubjects,
          attendance: state.attendance,
          seats: state.seats,
          links: state.links,
          email: state.user.email || '',
          displayName: state.user.displayName || '',
          photoURL: state.user.photoURL || ''
        }, { merge: true }).catch(console.error);
      }
      function isAbsent(lid) { return !!state.attendance[lid]; }
      function isLecturePast(e) {
        var now = new Date();
        if (e.end) return e.end <= now;
        if (e.start) return e.start <= now;
        // Fall back: parse date string "DD-Mon-YYYY" and compare with today's date
        if (e.date) {
          var MONTHS = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };
          var p = e.date.split('-');
          if (p.length === 3) {
            var lecDay = new Date(parseInt(p[2]), MONTHS[p[1]] || 0, parseInt(p[0]));
            var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            return lecDay < today;
          }
        }
        return false;
      }
      function toggleAttendance(lid) {
        if (state.attendance[lid]) delete state.attendance[lid]; else state.attendance[lid] = true;
        setLocal('attendance', state.attendance);
        syncToFirebase();
      }

      // ── Theme ──────────────────────────────────────────────────
      function applyTheme(dark) {
        darkMode = dark;
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
        document.getElementById('themeColor').content = dark ? '#13151a' : '#1c1f24';
        setLocal('dark-mode', dark);
      }

      // ── Fetch ──────────────────────────────────────────────────
      function fetchData(silent) {
        state.fetching = true;
        if (!silent) render();
        fetch('/api/timetable?t=' + Date.now())
          .then(function (r) {
            if (!r.ok) return r.json().catch(function () { return { error: 'http_' + r.status }; });
            return r.json();
          })
          .then(function (json) {
            if (json && json.error === 'auth') { state.fetchError = 'auth'; }
            else if (json && json.error) { if (!silent || !state.data) state.fetchError = json.message || json.error; }
            else { state.data = json; state.lastFetch = new Date(); state.fetchError = null; setLocal('cached-timetable', json); setLocal('cached-time', new Date().toISOString()); }
            state.fetching = false; render();
          })
          .catch(function (e) {
            var cached = getLocal('cached-timetable');
            if (cached && !state.data) { state.data = cached; var ct = getLocal('cached-time'); state.lastFetch = ct ? new Date(ct) : null; }
            if (!silent || !state.data) state.fetchError = (e && e.message) || 'Could not load timetable';
            state.fetching = false; render();
          });
      }

      // ── Events ─────────────────────────────────────────────────
      function buildEvents() {
        if (!state.data) return [];
        var mySet = {}; state.mySubjects.forEach(function (k) { mySet[k] = true; });
        var events = [];
        state.data.rows.forEach(function (row) {
          row.cells.forEach(function (cell, idx) {
            var sh = state.data.slotHeaders[idx] || '';
            var range = parseSlotRange(sh);
            var lines = cell.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
            if (!lines.length) return;
            var cl = lines.filter(function (l) { return parseLine(l) !== null; });
            if (!cl.length) {
              events.push({
                type: 'info', date: row.date, day: row.day, slotIndex: idx, slotHeader: sh, text: lines.join(' · '),
                start: range ? dtr(row.date, range.start) : null, end: range ? dtr(row.date, range.end) : null
              });
              return;
            }
            cl.forEach(function (line) {
              var p = parseLine(line); if (!mySet[p.key]) return;
              events.push({
                type: 'class', date: row.date, day: row.day, slotIndex: idx, slotHeader: sh,
                subject: p.subject, section: p.section, room: p.room, key: p.key, week: p.week,
                lectureId: p.key + ':' + p.week,
                cancelled: p.cancelled,
                start: range ? dtr(row.date, range.start) : null, end: range ? dtr(row.date, range.end) : null
              });
            });
          });
        });
        return events;
      }

      function getAllKeys() {
        if (!state.data) return [];
        var f = {}; state.data.rows.forEach(function (r) { r.cells.forEach(function (c) { c.split('\n').forEach(function (l) { var p = parseLine(l); if (p) f[p.key] = true; }); }); });
        return Object.keys(f).sort();
      }
      function parseSlotRange(h) {
        var m = h.match(/(\d{1,2})\.(\d{2})\s*-+\s*(\d{1,2})\.(\d{2})/);
        if (!m) return null;
        return { start: m[1].padStart(2, '0') + ':' + m[2], end: m[3].padStart(2, '0') + ':' + m[4] };
      }
      function dtr(ds, hhmm) {
        var p = ds.split('-'); if (p.length !== 3) return null;
        var d = new Date(p[0] + ' ' + p[1] + ' ' + p[2] + ' ' + hhmm + ':00');
        return isNaN(d.getTime()) ? null : d;
      }
      function getNowNext(events) {
        var now = new Date();
        var ce = events.filter(function (e) { return e.type === 'class' && e.start && e.end; });
        ce.sort(function (a, b) { return a.start - b.start; });
        var cur = null, nxt = null;
        for (var i = 0; i < ce.length; i++) {
          if (now >= ce[i].start && now <= ce[i].end) cur = ce[i];
          if (!nxt && ce[i].start > now) nxt = ce[i];
        }
        return { current: cur, next: nxt };
      }
      function fmt(d) { return d ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--:--'; }
      function until(d) { var m = Math.round((d - new Date()) / 60000); if (m < 1) return 'now'; if (m < 60) return 'in ' + m + 'm'; return 'in ' + Math.floor(m / 60) + 'h' + (m % 60 ? ' ' + (m % 60) + 'm' : ''); }
      function ago(d) { if (!d) return 'never'; var s = Math.round((new Date() - d) / 1000); if (s < 5) return 'just now'; if (s < 60) return s + 's ago'; return Math.floor(s / 60) + 'm ago'; }
      function todayStr() { var d = new Date(), M = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]; return String(d.getDate()).padStart(2, '0') + '-' + M[d.getMonth()] + '-' + d.getFullYear(); }
      function esc(s) { return (s || '').replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

      // ── Render ──────────────────────────────────────────────────
      function render() {
        if (!state.authInitialized) return renderLoading();
        if (state.authInitialized && !state.user) return renderLogin();

        if (state.fetchError === 'auth' && !state.data) return renderError('auth');
        if (state.fetchError && !state.data) return renderError(state.fetchError);
        if (!state.data) return renderLoading();
        buildColorMap(); // assign unique colors to subjects before any page renders
        if (currentPage === 'attendance') return renderAttendance();
        if (currentPage === 'calendar') return renderCalendar();
        if (currentPage === 'links') return renderLinks();
        if (currentPage === 'network' && state.user && state.user.email === 'p25kunal@iimnagpur.ac.in') return renderNetwork();
        renderTimetable();
      }

      // ── Header ──────────────────────────────────────────────────
      function hdrHtml() {
        var userBtn = state.user 
          ? '<img src="' + esc(state.user.photoURL) + '" class="user-avatar" id="btnUser" title="Sign out (' + esc(state.user.email) + ')">'
          : '<button class="icon-btn" id="btnUser" title="Sign in with Google">👤</button>';

        return '<div class="header">' +
          '<div class="title">IIMN Timetable<small>by Kunal Jakhotiya</small></div>' +
          '<div class="header-actions">' +
          userBtn +
          '<button class="icon-btn" id="btnDark" title="Toggle Dark Mode">' + (darkMode ? '☀️' : '🌙') + '</button>' +
          '<button class="icon-btn" id="btnInstall" title="Install App">📲</button>' +
          '<button class="icon-btn" id="btnSubjects" title="My Subjects">📚</button>' +
          '<button class="icon-btn' + (state.fetching ? ' spinning' : '') + '" id="btnRefresh">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>' +
          '</button>' +
          '</div></div>';
      }

      function navHtml() {
        var isT = currentPage === 'timetable', isA = currentPage === 'attendance', isC = currentPage === 'calendar', isL = currentPage === 'links', isN = currentPage === 'network';
        var isAdmin = state.user && state.user.email === 'p25kunal@iimnagpur.ac.in';
        return '<div class="bottom-nav">' +
          '<button class="nav-btn' + (isT ? ' active' : '') + '" id="navTT"><span class="nav-icon">🗓</span>Timetable</button>' +
          '<button class="nav-btn' + (isC ? ' active' : '') + '" id="navCal"><span class="nav-icon">📅</span>Calendar</button>' +
          '<button class="nav-btn' + (isA ? ' active' : '') + '" id="navAT"><span class="nav-icon">📊</span>Attendance</button>' +
          '<button class="nav-btn' + (isL ? ' active' : '') + '" id="navLinks"><span class="nav-icon">🔗</span>Links</button>' +
          (isAdmin ? '<button class="nav-btn' + (isN ? ' active' : '') + '" id="navNet"><span class="nav-icon">👥</span>Network</button>' : '') +
          '</div>';
      }

      function syncHtml() {
        var ok = !state.fetchError;
        return '<div class="sync-row"><span class="sync-dot' + (ok ? '' : ' err') + '"></span>' +
          '<span>' + (ok ? 'Synced ' + ago(state.lastFetch) : 'Sync failed · showing last data') + '</span></div>';
      }

      function bindHdr() {
        var bd = document.getElementById('btnDark');
        var bi = document.getElementById('btnInstall');
        var bs = document.getElementById('btnSubjects');
        var br = document.getElementById('btnRefresh');
        var bu = document.getElementById('btnUser');
        if (bd) bd.onclick = function () { applyTheme(!darkMode); render(); };
        if (bi) bi.onclick = openInstall;
        if (bs) bs.onclick = openPicker;
        if (br) br.onclick = function () { fetchData(); };
        if (bu) bu.onclick = function () {
          if (state.user) {
            if (confirm('Sign out of ' + state.user.email + '?')) window.fbSignOut(window.fbAuth);
          } else {
            window.fbSignInWithPopup(window.fbAuth, window.fbGoogleProvider).catch(function(e) { console.error('Sign-in error', e); alert('Could not sign in: ' + e.message); });
          }
        };
      }
      function bindNav() {
        var t = document.getElementById('navTT'), c = document.getElementById('navCal'), a = document.getElementById('navAT'), l = document.getElementById('navLinks'), n = document.getElementById('navNet');
        if (t) t.onclick = function () { currentPage = 'timetable'; render(); };
        if (c) c.onclick = function () { currentPage = 'calendar'; render(); };
        if (a) a.onclick = function () { currentPage = 'attendance'; render(); };
        if (l) l.onclick = function () { currentPage = 'links'; render(); };
        if (n) n.onclick = function () { currentPage = 'network'; render(); };
      }

      // ── Timetable page ──────────────────────────────────────────
      function renderTimetable() {
        var events = buildEvents(), nn = getNowNext(events), td = todayStr();
        ROOT.innerHTML = '<div class="sticky-container">' + hdrHtml() + '<div id="tick-update">' + syncHtml() + boardHtml(nn) + '</div></div>' +
          (state.mySubjects.length === 0
            ? '<div class="empty-state">No subjects selected.<br><br>Tap <b>📚</b> to pick yours.</div>'
            : '<div class="days">' + daysHtml(events, td) + '</div>') +
          navHtml();
        bindHdr(); bindNav();
        var daysDiv = ROOT.querySelector('.days');
        if (daysDiv) daysDiv.addEventListener('click', function (ev) {
          var btn = ev.target.closest('.attend-btn'); if (!btn) return;
          var lid = btn.getAttribute('data-lid'); if (!lid) return;
          toggleAttendance(lid);
          var ab = isAbsent(lid);
          btn.textContent = ab ? '❌' : '✅';
          btn.className = 'attend-btn' + (ab ? ' is-absent' : '');
          var row = btn.closest('.slot-row');
          if (row) row.className = 'slot-row' + (ab ? ' absent-row' : '');
        });
        var tc = ROOT.querySelector('.day-card.today');
        if (tc) setTimeout(function () { tc.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }

      function boardHtml(nn) { return '<div class="board">' + bCard(nn.current, true) + bCard(nn.next, false) + '</div>'; }
      function bCard(ev, isNow) {
        var lbl = isNow ? 'NOW' : 'NEXT';
        if (!ev) return '<div class="board-card' + (isNow ? ' now' : '') + '"><div class="board-label">' + lbl + '</div><div class="board-empty">' + (isNow ? 'No class right now' : 'Nothing else today') + '</div></div>';
        var col = ev.cancelled ? 'var(--danger)' : colorFor(ev.subject);
        var meta = isNow ? fmt(ev.start) + ' – ' + fmt(ev.end) : fmt(ev.start) + ' · ' + until(ev.start);
        var seat = state.seats[ev.key];
        var seatHtml = seat ? '<span class="seat-badge">🪑 ' + esc(seat) + '</span>' : '';
        return '<div class="board-card' + (isNow ? ' now' : '') + '">' +
          '<div class="board-pill" style="background:' + col + '"></div>' +
          '<div class="board-label">' + lbl + '</div>' +
          '<div class="board-code">' + esc(ev.subject) + (ev.section ? '-' + ev.section : '') + (ev.cancelled ? '<br><span style="color:var(--danger);font-size:14px;">(CANCELLED)</span>' : '') + '</div>' +
          '<div class="board-room"><span>' + esc(ev.room) + '</span>' + seatHtml + '</div>' +
          '<div class="board-meta">' + meta + '</div></div>';
      }

      function daysHtml(events, td) {
        var order = [], byDate = {};
        state.data.rows.forEach(function (r) { if (!byDate[r.date]) { byDate[r.date] = []; order.push(r.date); } });
        events.forEach(function (e) { byDate[e.date].push(e); });
        return order.map(function (date) {
          var evs = byDate[date].slice().sort(function (a, b) { return a.slotIndex - b.slotIndex; });
          var r = state.data.rows.find(function (x) { return x.date === date; });
          var isToday = date === td;
          var body = !evs.length ? '<div class="empty-day">No classes for your subjects</div>' : evs.map(function (e) {

        var now = new Date();
        var y = calViewMonth.getFullYear(), mo = calViewMonth.getMonth();
        var MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        // Days of week header
        var dowHtml = DAYS.map(function (d) { return '<div class="cal-dow">' + d + '</div>'; }).join('');

        // First day of month, total days

        var daysInPrev = new Date(y, mo, 0).getDate();

        var cells = '';
        var total = firstDay + daysInMonth; var rows = Math.ceil(total / 7) * 7;
        for (var i = 0; i < rows; i++) {
          var day, month = mo, year = y, other = false;
          if (i < firstDay) { day = daysInPrev - (firstDay - 1 - i); month = mo - 1; other = true; }
          else if (i >= firstDay + daysInMonth) { day = i - (firstDay + daysInMonth) + 1; month = mo + 1; other = true; }
          else { day = i - firstDay + 1; }
          if (month < 0) { month = 11; year--; } else if (month > 11) { month = 0; year++; }
          var M = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
          var dateStr = String(day).padStart(2, '0') + '-' + M[month] + '-' + year;

                '<div><span class="room-chip">' + esc(e.room) + '</span></div>' +

          detailHtml = '<div class="cal-detail">' +

            slots + '</div>';

        page.innerHTML =
          '<div class="cal-nav">' +
          '<button class="cal-nav-btn" id="calPrev">‹</button>' +
          '<span class="cal-month">' + MONTHS[mo] + ' ' + y + '</span>' +

      // ── Network / Admin page ────────────────────────────────────
      function fetchUsers() {
        if (!window.fbCollection || !window.fbGetDocs) return;
        window.fbGetDocs(window.fbCollection(window.fbDb, "users")).then(function(snapshot) {
          var users = [];
          snapshot.forEach(function(doc) {
            var d = doc.data();
            d.uid = doc.id;
            users.push(d);
          });
          state.adminUsers = users;

      function buildGroupEvents() {
        if (!state.data) return [];
        var selectedIds = Object.keys(state.networkSelected);
        if (!selectedIds.length) return [];
        
        var events = [];
        state.data.rows.forEach(function (row) {
          row.cells.forEach(function (cell, idx) {
            var sh = state.data.slotHeaders[idx] || '';
            var range = parseSlotRange(sh);
            var lines = cell.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
            if (!lines.length) return;
            var cl = lines.filter(function (l) { return parseLine(l) !== null; });
            if (!cl.length) return; // Info slot, ignore for compare
            
            var busyUsers = [];
            cl.forEach(function (line) {
              var p = parseLine(line);
              if (!p) return;
              selectedIds.forEach(function(uid) {
                var u = state.networkSelected[uid];
                if (u.mySubjects && u.mySubjects.includes(p.key)) {
                  var nm = u.displayName;
                  if (!nm && u.email) {
                    var prefix = u.email.split('@')[0];
                    if (prefix.match(/^p\d{2}/i)) prefix = prefix.substring(3);
                    nm = prefix.charAt(0).toUpperCase() + prefix.slice(1);
                  }
                  if (!nm) nm = 'Unknown';
                  if (!busyUsers.includes(nm)) busyUsers.push(nm);
                }
              });
            });

            if (busyUsers.length === 0) {
              events.push({
                type: 'class', date: row.date, day: row.day, slotIndex: idx, slotHeader: sh,
                subject: 'FREE', section: '', room: 'Everyone is Free!', key: 'FREE', week: '',
                lectureId: 'FREE_' + row.date + '_' + idx,
                cancelled: false, isFree: true,
                start: range ? dtr(row.date, range.start) : null, end: range ? dtr(row.date, range.end) : null
              });
            } else {
              events.push({
                type: 'class', date: row.date, day: row.day, slotIndex: idx, slotHeader: sh,
                subject: 'BUSY', section: '', room: 'Busy: ' + busyUsers.join(', '), key: 'BUSY', week: '',
                lectureId: 'BUSY_' + row.date + '_' + idx,
                cancelled: false, isBusy: true,
                start: range ? dtr(row.date, range.start) : null, end: range ? dtr(row.date, range.end) : null
              });
            }
          });
        });
        return events;
      }

      function groupDaysHtml(events, td) {

        state.data.rows.forEach(function (r) { if (!byDate[r.date]) { byDate[r.date] = []; order.push(r.date); } });
        events.forEach(function (e) { byDate[e.date].push(e); });
        return order.map(function (date) {
          var evs = byDate[date].slice().sort(function (a, b) { return a.slotIndex - b.slotIndex; });
          if (!evs.length) return '';
          var r = state.data.rows.find(function (x) { return x.date === date; });
          var isToday = date === td;
          var body = evs.map(function (e) {
            var col = e.isFree ? 'var(--success)' : 'var(--danger)';
            var bgCol = e.isFree ? 'rgba(76, 175, 130, 0.15)' : 'rgba(239, 83, 80, 0.1)';

              '<div class="slot-main">' +
              '<div class="slot-top"><span class="subject-badge" style="background:' + col + '">' + esc(e.subject) + '</span></div>' +

      function renderAttendance() {
        ROOT.innerHTML = '<div class="sticky-container">' + hdrHtml() + '</div>' + navHtml();
        var nav = ROOT.querySelector('.bottom-nav');
        var page = document.createElement('div'); page.className = 'att-page';
        if (!state.mySubjects.length) {
          page.innerHTML = '<div class="empty-state">No subjects selected.<br>Tap <b>📚</b> to pick yours.</div>';
        } else {
          var events = buildEvents();
          page.innerHTML = state.mySubjects.map(function (key) {
            var lecs = events.filter(function (e) { return e.type === 'class' && e.key === key; });
            lecs.sort(function (a, b) { return (parseInt(a.week) || 0) - (parseInt(b.week) || 0); });
            var pastLecs = lecs.filter(function (e) { return isLecturePast(e); });
            var abCnt = pastLecs.filter(function (e) { return isAbsent(e.lectureId); }).length;
            var pastTotal = pastLecs.length;
            var att = pastTotal - abCnt;
            var pct = pastTotal ? Math.round(att / pastTotal * 100) : 100;
            var left = 3 - abCnt;
            var col = colorFor(key.split('-')[0]);
            var pc = left < 0 ? 'danger' : left <= 1 ? 'warn' : 'ok';
            var pt = left < 0 ? Math.abs(left) + ' over!' : left + ' left';
            var bc = left < 0 ? 'var(--danger)' : left <= 1 ? 'var(--warn)' : 'var(--good)';
            var chips = lecs.map(function (e) {
              var ab = isAbsent(e.lectureId);
              var past = isLecturePast(e);
              var cls = ab ? ' absent' : (past ? ' present' : ' upcoming');
              var lid = e.lectureId.replace(/"/g, '');
              return '<div class="lec-chip' + cls + '" data-lid="' + esc(lid) + '" data-upcoming="' + (!past ? '1' : '') + '">' + esc(e.week) + '</div>';
            }).join('');
            var statsHtml = pastTotal
              ? att + ' attended \xb7 ' + abCnt + ' absent \xb7 ' + pct + '%' + (lecs.length > pastTotal ? ' <span style="color:var(--text-dim)">(' + (lecs.length - pastTotal) + ' upcoming)</span>' : '')
              : '<span style="color:var(--text-dim)">No classes yet</span>';
            return '<div class="att-card">' +
              '<div class="att-card-head"><span class="att-subject" style="color:' + col + '">' + esc(key) + '</span><span class="att-status-pill ' + pc + '">' + pt + '</span></div>' +
              '<div class="att-bar-wrap"><div class="att-bar" style="width:' + pct + '%;background:' + bc + '"></div></div>' +
              '<div class="att-stats">' + statsHtml + '</div>' +
              '<div class="att-lectures">' + chips + '</div>' +
              '</div>';
          }).join('');
        }
        ROOT.insertBefore(page, nav);
        bindHdr(); bindNav();
        ROOT.querySelectorAll('.lec-chip').forEach(function (chip) {
          chip.addEventListener('click', function () {
            if (chip.getAttribute('data-upcoming') === '1') return; // can't mark future classes
            var lid = chip.getAttribute('data-lid'); if (!lid) return;
            toggleAttendance(lid); renderAttendance();
          });
        });
      }

      function renderLoading() {
        ROOT.innerHTML = '<div class="empty-state" style="padding-top:80px;"><div style="font-size:32px;margin-bottom:12px;">⏳</div>Loading…</div>';
      }
      function renderLogin() {
        ROOT.innerHTML = '<div class="setup-page" style="margin-top:20vh;">' +
          '<div class="setup-logo">🎓</div>' +
          '<div class="setup-title">IIMN Timetable</div>' +
          '<div class="setup-sub">Welcome! Please sign in with your <b>@iimnagpur.ac.in</b> Google account to view your schedule.</div>' +
          '<button class="btn btn-primary" id="btnMainLogin">Sign in with Google</button>' +
          '<button class="btn" id="btnInstallLogin" style="margin-top:10px;">Install App</button>' +
          '</div>';
        document.getElementById('btnMainLogin').onclick = function () {
          window.fbSignInWithPopup(window.fbAuth, window.fbGoogleProvider).catch(function(e) { console.error('Sign-in error', e); alert('Could not sign in: ' + e.message); });
        };
        document.getElementById('btnInstallLogin').onclick = openInstall;
      }
      function renderError(err) {
        var isAuth = err === 'auth';
        ROOT.innerHTML = '<div class="setup-page">' +
          '<div class="setup-logo" style="color:' + (isAuth ? 'var(--accent)' : 'var(--danger)') + '">' + (isAuth ? '🔐' : '!') + '</div>' +
          '<div class="setup-title">' + (isAuth ? 'Sign in required' : 'Could not load timetable') + '</div>' +
          '<div class="setup-sub">' + (isAuth ? 'Sign in with your <b>@iimnagpur.ac.in</b> Google account to continue.' : esc(err)) + '</div>' +
          (isAuth
            ? '<button class="btn btn-primary" id="btnSignIn">Sign in with Google</button>'
            : '<button class="btn btn-primary" id="btnRetry">Try Again</button>') +
          '</div>';
        if (isAuth) document.getElementById('btnSignIn').onclick = function () { window.open('https://script.google.com/a/macros/iimnagpur.ac.in/s/AKfycbxBxonDpBgnWDV-vChOuysOLA8WgjE0dZ6Fpl1FAPE9ju3WldBRdqWnXlqDQf2a4_Y31A/exec', '_blank'); setTimeout(function () { fetchData(); }, 3000); };
        else document.getElementById('btnRetry').onclick = function () { fetchData(); };
      }

      // ── Subject picker ──────────────────────────────────────────
      function openPicker() {
        var keys = getAllKeys(), selected = state.mySubjects.slice();
        var ov = document.createElement('div'); ov.className = 'overlay';
        ov.innerHTML = '<div class="sheet"><div class="sheet-head"><h2>📚 My Subjects &amp; Sections</h2><button class="icon-btn" id="closePkr">✕</button></div>' +
          '<div class="sheet-body"><input type="search" id="pkrSearch" placeholder="Search e.g. DDM, BM…"><div class="toplinks"><span id="selAll">Select all</span><span id="clrAll">Clear all</span></div><div class="chip-list" id="chipList"></div></div>' +
          '<div class="sheet-foot"><button class="btn btn-primary" id="saveSub">Save &amp; Apply</button></div></div>';
        document.body.appendChild(ov);
        function draw(f) {
          f = (f || '').toLowerCase();
          var items = keys.filter(function (k) { return k.toLowerCase().indexOf(f) !== -1; });
          var el = document.getElementById('chipList');
          if (!items.length) { el.innerHTML = '<div style="padding:10px;color:var(--text-dim)">No matches</div>'; return; }
          el.innerHTML = items.map(function (k) {
            var p = k.split('-'), sub = p[0], sec = p[1] || '', col = colorFor(sub), chk = selected.indexOf(k) !== -1 ? 'checked' : '';
            var seat = state.seats[k] || '';
            var seatInput = '<input type="number" class="seat-input ' + (chk ? '' : 'hidden') + '" data-key="' + k + '" placeholder="Seat" value="' + esc(seat) + '">';
            return '<div class="chip-item"><label><input type="checkbox" value="' + k + '" ' + chk + '><span class="chip-dot" style="background:' + col + '"></span><span class="chip-sub">' + esc(sub) + '</span>' + (sec ? '<span class="chip-sec">Section ' + esc(sec) + '</span>' : '<span class="chip-sec">(no section)</span>') + '</label>' + seatInput + '</div>';
          }).join('');
          el.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
            cb.onchange = function () {
              if (cb.checked) { if (selected.indexOf(cb.value) === -1) selected.push(cb.value); }
              else selected = selected.filter(function (s) { return s !== cb.value; });
              var si = cb.closest('.chip-item').querySelector('.seat-input');
              if (si) si.className = 'seat-input ' + (cb.checked ? '' : 'hidden');
            };
          });
          el.querySelectorAll('.seat-input').forEach(function(si) {
            si.oninput = function() {
              if (si.value) state.seats[si.getAttribute('data-key')] = si.value;
              else delete state.seats[si.getAttribute('data-key')];
            };
          });
        }
        draw();
        document.getElementById('pkrSearch').oninput = function (e) { draw(e.target.value); };
        document.getElementById('selAll').onclick = function () { selected = keys.slice(); draw(document.getElementById('pkrSearch').value); };
        document.getElementById('clrAll').onclick = function () { selected = []; draw(document.getElementById('pkrSearch').value); };
        document.getElementById('closePkr').onclick = function () { ov.remove(); };
        document.getElementById('saveSub').onclick = function () { state.mySubjects = selected; setLocal('my-subjects', selected); setLocal('seats', state.seats); syncToFirebase(); ov.remove(); render(); };
      }

      // ── Install ─────────────────────────────────────────────────
      var dp = null;
      window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); dp = e; });
      function openInstall() {
        if (dp) { dp.prompt(); dp.userChoice.then(function () { dp = null; }); return; }
        var ua = navigator.userAgent || '';
        var ios = /iPhone|iPad|iPod/i.test(ua);
        var body = ios
          ? '<p style="font-size:14px;line-height:1.8;margin:0">In <b>Safari</b>:<br>1. Tap the <b>Share ⬆️</b> icon at the bottom<br>2. Tap <b>Add to Home Screen</b><br>3. Tap <b>Add</b> ✅</p>'
          : '<p style="font-size:14px;line-height:1.8;margin:0">Open on your phone in Chrome or Safari and use <b>Add to Home Screen</b>.</p>';
        var ov = document.createElement('div'); ov.className = 'overlay';
        ov.innerHTML = '<div class="sheet"><div class="sheet-head"><h2>📲 Install App</h2><button class="icon-btn" id="closeInst">✕</button></div><div class="sheet-body">' + body + '</div></div>';
        document.body.appendChild(ov);
        document.getElementById('closeInst').onclick = function () { ov.remove(); };
      }

      // ── Init ──────────────────────────────────────────────
      function init() {
        var dm = getLocal('dark-mode'); if (dm) applyTheme(true);
        var sub = getLocal('my-subjects'); if (sub) state.mySubjects = sub;
        var att = getLocal('attendance'); if (att) state.attendance = att;
        var sts = getLocal('seats'); if (sts) state.seats = sts;
        var lnks = getLocal('links'); if (lnks) state.links = lnks;
        var cached = getLocal('cached-timetable');
        if (cached) { state.data = cached; var ct = getLocal('cached-time'); state.lastFetch = ct ? new Date(ct) : null; }
        
        // ── Normal Firebase auth ──
          window.fbOnAuthStateChanged(window.fbAuth, function(user) {
            state.authInitialized = true;
            if (user) {
              if (!user.email.endsWith('@iimnagpur.ac.in')) {
                alert('Please sign in using your @iimnagpur.ac.in Google account.');
                window.fbSignOut(window.fbAuth);
                return;
              }
              state.user = user;
              window.fbGetDoc(window.fbDoc(window.fbDb, "users", user.uid)).then(function(docSnap) {
                if (docSnap.exists()) {
                  var d = docSnap.data();
                  if (d.mySubjects) { state.mySubjects = d.mySubjects; setLocal('my-subjects', d.mySubjects); }
                  if (d.attendance) { state.attendance = Object.assign({}, state.attendance, d.attendance); setLocal('attendance', state.attendance); }
                  if (d.seats) { state.seats = Object.assign({}, state.seats, d.seats); setLocal('seats', state.seats); }
                  if (d.links) { state.links = d.links; setLocal('links', d.links); }
                }
                render();
              }).catch(console.error);
            } else {
              state.user = null;
            }
            render();
          });
          render();
          fetchData();

        setInterval(function () { if (state.data && currentPage === 'timetable') updateTick(); }, 15000);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function () { });
      }
      
      function updateTick() {
        var el = document.getElementById('tick-update');
        if (el) {
          var events = buildEvents(), nn = getNowNext(events);
          el.innerHTML = syncHtml() + boardHtml(nn);
        }
      }
      init();
    })();
  </script>
</body>
